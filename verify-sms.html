<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OweMe — Verifying SMS Credits</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1B2A;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#1A2E45;border-radius:16px;padding:40px 24px;max-width:400px;width:100%;text-align:center}
.spinner{width:48px;height:48px;border:4px solid #1A2E45;border-top-color:#4ADE80;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
.emoji{font-size:56px;margin-bottom:16px}
h2{font-size:20px;font-weight:700;margin-bottom:8px}
p{color:#8899AA;font-size:14px;line-height:1.6}
.green{color:#4ADE80}
.red{color:#F87171}
</style>
</head>
<body>
<div class="card">
    <div id="loading">
        <div class="spinner"></div>
        <p style="color:#8899AA;font-size:14px">Verifying your payment...</p>
    </div>
    <div id="success" style="display:none">
        <div class="emoji">🎉</div>
        <h2 class="green">Credits Added!</h2>
        <p id="success-msg">Your SMS credits have been added. Go back to OweMe to use them.</p>
    </div>
    <div id="error" style="display:none">
        <div class="emoji">❌</div>
        <h2 class="red">Verification Failed</h2>
        <p id="error-msg">Something went wrong. Please contact support.</p>
    </div>
</div>

<script>
const params         = new URLSearchParams(window.location.search);
const uid            = params.get("uid")            || "";
const transaction_id = params.get("transaction_id") || "";
const credits        = parseInt(params.get("credits") || "0");
const BACKEND_URL    = "https://oweme-backend-vercel.vercel.app/api";

async function verify() {
    if (!uid || !transaction_id || !credits) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-msg").textContent =
            "Missing payment details. Go back to OweMe and try again.";
        document.getElementById("error").style.display = "block";
        return;
    }

    try {
        const response = await fetch(BACKEND_URL + "/buy-sms-credits", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                transaction_id: transaction_id,
                uid: uid,
                credits: credits
            })
        });

        const data = await response.json();
        document.getElementById("loading").style.display = "none";

        if (data.success) {
            document.getElementById("success-msg").textContent =
                credits + " SMS credits added! You now have " + data.newTotal + " credits.";
            document.getElementById("success").style.display = "block";
        } else {
            document.getElementById("error-msg").textContent =
                data.error || "Verification failed. Contact support.";
            document.getElementById("error").style.display = "block";
        }
    } catch (err) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-msg").textContent =
            "Network error. Check your connection.";
        document.getElementById("error").style.display = "block";
    }
}

verify();
</script>
</body>
</html>
