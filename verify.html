<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OweMe — Verifying Payment</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1B2A;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#1A2E45;border-radius:16px;padding:40px 24px;max-width:400px;width:100%;text-align:center}
.logo{width:56px;height:56px;background:#4ADE80;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#0D1B2A;margin:0 auto 24px}
.spinner{width:48px;height:48px;border:4px solid #0D1B2A;border-top-color:#4ADE80;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
.emoji{font-size:56px;margin-bottom:16px}
h2{font-size:20px;font-weight:700;margin-bottom:8px}
p{color:#8899AA;font-size:14px;line-height:1.6}
.green{color:#4ADE80}
.red{color:#F87171}
.btn{width:100%;background:#4ADE80;color:#0D1B2A;border:none;border-radius:10px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px}
</style>
</head>
<body>
<div class="card">

    <div id="loading">
        <div class="logo">₦</div>
        <div class="spinner"></div>
        <p style="color:#8899AA;font-size:14px">Verifying your payment...<br/>Please wait</p>
    </div>

    <div id="success" style="display:none">
        <div class="logo">₦</div>
        <div class="emoji">🎉</div>
        <h2 class="green">Premium Unlocked!</h2>
        <p>Your account has been upgraded to OweMe Premium. Go back to the app to enjoy full access.</p>
        <button class="btn" onclick="window.close()">Close & Return to App</button>
    </div>

    <div id="error" style="display:none">
        <div class="logo">₦</div>
        <div class="emoji">❌</div>
        <h2 class="red">Verification Failed</h2>
        <p id="error-msg">Something went wrong. Please contact support if you were charged.</p>
        <p style="margin-top:12px;font-size:13px">Email: <a href="mailto:univaultapps@gmail.com" style="color:#4ADE80">univaultapps@gmail.com</a></p>
    </div>

</div>

<script>
const params         = new URLSearchParams(window.location.search);
const uid            = params.get("uid")            || "";
const transaction_id = params.get("transaction_id") || "";
const status         = params.get("status")         || "";
const BACKEND_URL    = "https://oweme-backend-vercel.vercel.app/api";

async function verify() {
    if (!uid || !transaction_id) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-msg").textContent =
            "Missing payment details. Please contact support.";
        document.getElementById("error").style.display = "block";
        return;
    }

    if (status !== "successful") {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-msg").textContent =
            "Payment was not completed. No charge was made.";
        document.getElementById("error").style.display = "block";
        return;
    }

    try {
        const response = await fetch(BACKEND_URL + "/verify-premium", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                transaction_id: transaction_id,
                uid: uid
            })
        });

        const data = await response.json();
        document.getElementById("loading").style.display = "none";

        if (data.success) {
            document.getElementById("success").style.display = "block";
        } else {
            document.getElementById("error-msg").textContent =
                data.error || "Verification failed. Contact support.";
            document.getElementById("error").style.display = "block";
        }
    } catch (err) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-msg").textContent =
            "Network error. Check your connection and try again.";
        document.getElementById("error").style.display = "block";
    }
}

verify();
</script>
</body>
</html>
